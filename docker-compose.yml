services:
  ollama:
    image: ollama/ollama:latest
    container_name: fireform-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - fireform-network
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fireform-app
    depends_on:
      ollama:
        condition: service_healthy
    command: /bin/sh -c "python3 -m api.db.init_db && python3 -m uvicorn api.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - CUDA_VISIBLE_DEVICES=""
      # Fix #118 #116 — correct PYTHONPATH to project root
      - PYTHONPATH=/app
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_TIMEOUT=300
    networks:
      - fireform-network

  frontend:
    image: python:3.11-slim
    container_name: fireform-frontend
    working_dir: /app
    command: python3 -m http.server 5173 --directory frontend
    volumes:
      - .:/app
    ports:
      - "5173:5173"
    depends_on:
      app:
        condition: service_started
    networks:
      - fireform-network

volumes:
  ollama_data:
    driver: local

networks:
  fireform-network:
    driver: bridge
